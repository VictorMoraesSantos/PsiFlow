services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  seq:
    ports:
      - "5341:80"

  auth.api:
    ports:
      - "5001:8080"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro

  patients.api:
    ports:
      - "5002:8080"

  agenda.api:
    ports:
      - "5003:8080"

  sessions.api:
    ports:
      - "5004:8080"

  clinicalrecords.api:
    ports:
      - "5005:8080"

  notifications.api:
    ports:
      - "5006:8080"

  onlinesession.api:
    ports:
      - "5007:8080"
